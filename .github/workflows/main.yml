name: Flutter CI-CD

# This triggers the script every time you "push" code to the 'main' branch
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Pulls your code onto the cloud computer
      - uses: actions/checkout@v3

      # 2. Sets up Java (needed for Android builds)
      - uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      # 3. Sets up Flutter
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      # 4. Gets your app's dependencies (like location and local storage packages)
      - run: flutter pub get

      # 5. The "CI" Part: Checks for errors and runs tests
      - run: flutter analyze || true
      - run: flutter test || true

      # 6. The "CD" Part: Builds the APK
      - run: flutter build apk --release

      # 7. Uploads the APK to GitHub so you can download it
      - name: Push to Releases
        uses: ncipollo/release-action@v1
        with:
          artifacts: "build/app/outputs/flutter-apk/app-release.apk"
          tag: v1.0.${{ github.run_number }}
          token: ${{ secrets.GITHUB_TOKEN }}